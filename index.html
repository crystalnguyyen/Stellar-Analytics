<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Team</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { text-align: center; }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .card {
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 1.5rem 1rem;
    }
    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    .card h2 { font-size: 1rem; margin: 0.75rem 0 0.25rem; }
    .card p  { color: #666; font-size: 0.85rem; margin: 0 0 0.75rem; }
    .card a  { color: #0077b5; text-decoration: none; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Our Team</h1>
  <div class="team-grid">

    <div class="card">
      <img src="photos/alice.jpg" alt="Alice Smith" />
      <h2>Alice Smith</h2>
      <p>Frontend Developer</p>
      <a href="https://linkedin.com/in/alicesmith" target="_blank">LinkedIn →</a>
    </div>

    <!-- Repeat for each team member -->

  </div>
</body>
</html>
